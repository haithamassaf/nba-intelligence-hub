[project]
name = "nba-intelligence-hub"
version = "1.0.0"
description = "RAG-powered NBA analytics assistant"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
include = ["config*", "data*", "rag*", "api*", "frontend*"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"
